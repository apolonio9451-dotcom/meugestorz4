<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Meu Gestor</title>
    <link rel="icon" href="/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Preload critical fonts for instant render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="description" content="Sistema de gestão completo" />
    <meta name="author" content="Meu Gestor" />
    <meta property="og:title" content="Meu Gestor" />
    <meta property="og:description" content="Sistema de gestão completo" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // Apply cached theme instantly to prevent flash
      try {
        var cached = localStorage.getItem("meugestor-theme-vars");
        if (cached) {
          var vars = JSON.parse(cached);
          var root = document.documentElement;
          for (var key in vars) {
            if (vars.hasOwnProperty(key)) {
              root.style.setProperty(key, vars[key]);
            }
          }
        }
      } catch(e) {}

      // Pre-hydrate master role from auth cache to block PRO paywalls before React loads
      try {
        var authCache = localStorage.getItem("auth_cache");
        if (authCache) {
          var auth = JSON.parse(authCache);
          var role = auth.userRole;
          var plan = auth.planType;
          if (role === "Proprietário" || role === "Admin" || plan === "pro") {
            document.body.classList.add("is-master-user", "role-master");
          }
        } else {
          document.body.classList.add("auth-unresolved");
        }
      } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
